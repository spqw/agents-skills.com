<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Atlas | Curated Agent Skills</title>
  <meta name="description" content="Interactive map of curated agent skills with LLM-judge scoring, labels, and source links." />
  <meta property="og:title" content="Skill Atlas | Curated Agent Skills" />
  <meta property="og:description" content="Explore curated agent skills, compare judge scores, and inspect capability labels." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://skills.spqw.net" />
  <link rel="canonical" href="https://skills.spqw.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f5ef;
      --ink: #102a43;
      --muted: #486581;
      --card: #ffffff;
      --accent: #0f7b6c;
      --accent-2: #f17300;
      --line: #d9e2ec;
      --good: #2f9e44;
      --mid: #d97706;
      --low: #b42318;
      --shadow: 0 20px 60px rgba(15, 33, 54, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 5% 0%, rgba(15, 123, 108, 0.12), transparent 40%),
        radial-gradient(circle at 95% 10%, rgba(241, 115, 0, 0.11), transparent 45%),
        var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
    }

    .wrap {
      width: min(1160px, 92vw);
      margin: 0 auto;
      padding: 34px 0 50px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      margin-bottom: 26px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(15, 123, 108, 0.1);
      color: #0a5f53;
      border: 1px solid rgba(15, 123, 108, 0.35);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
    }

    h1 {
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin: 14px 0 10px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 64ch;
      font-size: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 10px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 14px;
      padding: 12px;
    }

    .stat .k {
      font: 700 28px/1 'Space Grotesk', sans-serif;
      display: block;
    }

    .stat .v {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'IBM Plex Mono', monospace;
    }

    .controls {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1.6fr 0.9fr;
      gap: 12px;
    }

    input[type="search"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      font: 500 14px 'IBM Plex Mono', monospace;
      color: var(--ink);
      background: #fff;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 6px 11px;
      font: 500 12px 'IBM Plex Mono', monospace;
      cursor: pointer;
      transition: 180ms ease;
    }

    .chip:hover { transform: translateY(-1px); }
    .chip.active {
      border-color: var(--accent);
      background: rgba(15, 123, 108, 0.12);
      color: #0a5f53;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      gap: 10px;
      animation: rise 320ms ease both;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .title {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .slug {
      margin: 4px 0 0;
      color: var(--muted);
      font: 400 12px/1.2 'IBM Plex Mono', monospace;
    }

    .badge {
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid;
      font: 600 11px 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }

    .desc { margin: 0; color: #334e68; font-size: 14px; }

    .meter {
      height: 7px;
      border-radius: 999px;
      background: #e8edf2;
      overflow: hidden;
    }

    .meter > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .criteria {
      display: grid;
      gap: 6px;
      margin-top: 4px;
    }

    .crit-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      font: 500 11px 'IBM Plex Mono', monospace;
      color: #334e68;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      gap: 10px;
    }

    .footer a {
      text-decoration: none;
      color: #0c5fba;
      font-family: 'IBM Plex Mono', monospace;
    }

    .empty {
      grid-column: 1/-1;
      padding: 30px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.5);
    }

    @keyframes rise {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .wrap { width: min(640px, 94vw); }
      h1 { font-size: 38px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div>
        <div class="eyebrow">SKILL ATLAS · Curated capabilities + LLM judge</div>
        <h1>Interactive showcase of agent skills</h1>
        <p class="subtitle">
          Source: <code>openai/skills/.curated</code>. Each skill receives a Codex judge score across five criteria and a capability label.
        </p>
      </div>
      <div class="stats">
        <article class="stat"><span class="k" id="stat-count">0</span><span class="v">Skills</span></article>
        <article class="stat"><span class="k" id="stat-top">0.0</span><span class="v">Top Score</span></article>
        <article class="stat"><span class="k" id="stat-avg">0.0</span><span class="v">Average</span></article>
      </div>
    </section>

    <section class="controls">
      <div class="row">
        <input id="search" type="search" placeholder="Search slug, title, description..." />
        <select id="sort">
          <option value="overall">Sort: Overall score</option>
          <option value="usefulness">Sort: Usefulness</option>
          <option value="implementation_clarity">Sort: Implementation clarity</option>
          <option value="automation_depth">Sort: Automation depth</option>
          <option value="safety_readiness">Sort: Safety readiness</option>
          <option value="integration_potential">Sort: Integration potential</option>
          <option value="name">Sort: Name A-Z</option>
        </select>
      </div>
      <div class="chips" id="label-chips"></div>
    </section>

    <section id="grid" aria-live="polite"></section>
  </main>

  <script>
    const criteriaOrder = ['usefulness', 'implementation_clarity', 'automation_depth', 'safety_readiness', 'integration_potential'];
    const criteriaTitles = {
      usefulness: 'Usefulness',
      implementation_clarity: 'Clarity',
      automation_depth: 'Automation',
      safety_readiness: 'Safety',
      integration_potential: 'Integration'
    };

    const state = {
      search: '',
      sort: 'overall',
      activeLabel: 'All'
    };

    const badgeColor = (score) => {
      if (score >= 8.5) return 'var(--good)';
      if (score >= 7) return 'var(--mid)';
      return 'var(--low)';
    };

    function escapeHtml(raw) {
      return raw
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function scoreWidth(v) {
      return `${Math.max(0, Math.min(100, v * 10))}%`;
    }

    function updateStats(items) {
      const count = items.length;
      const top = count ? Math.max(...items.map((x) => x.overall)) : 0;
      const avg = count ? (items.reduce((s, x) => s + x.overall, 0) / count) : 0;
      document.querySelector('#stat-count').textContent = String(count);
      document.querySelector('#stat-top').textContent = top.toFixed(1);
      document.querySelector('#stat-avg').textContent = avg.toFixed(1);
    }

    function renderChips(items) {
      const labels = ['All', ...new Set(items.map((x) => x.label).sort())];
      const host = document.querySelector('#label-chips');
      host.innerHTML = labels
        .map((label) => `<button class="chip ${state.activeLabel === label ? 'active' : ''}" data-label="${escapeHtml(label)}">${escapeHtml(label)}</button>`)
        .join('');

      host.querySelectorAll('button').forEach((b) => {
        b.addEventListener('click', () => {
          state.activeLabel = b.dataset.label || 'All';
          render(items);
        });
      });
    }

    function render(items) {
      const q = state.search.trim().toLowerCase();
      const filtered = items
        .filter((item) => {
          if (state.activeLabel !== 'All' && item.label !== state.activeLabel) return false;
          if (!q) return true;
          const blob = `${item.slug} ${item.title} ${item.description} ${item.reason}`.toLowerCase();
          return blob.includes(q);
        })
        .sort((a, b) => {
          if (state.sort === 'name') return a.slug.localeCompare(b.slug);
          return (b[state.sort] ?? 0) - (a[state.sort] ?? 0);
        });

      updateStats(filtered);

      const html = filtered.map((item) => {
        const color = badgeColor(item.overall);
        const bars = criteriaOrder.map((k) => {
          const v = item.scores[k];
          return `
            <div class="crit-row">
              <span>${criteriaTitles[k]}</span>
              <span>${v.toFixed(1)}</span>
            </div>
            <div class="meter"><span style="width:${scoreWidth(v)}"></span></div>
          `;
        }).join('');

        return `
          <article class="card">
            <header class="top">
              <div>
                <h2 class="title">${escapeHtml(item.title)}</h2>
                <p class="slug">${escapeHtml(item.slug)}</p>
              </div>
              <span class="badge" style="border-color:${color}; color:${color}">${escapeHtml(item.label)}</span>
            </header>
            <p class="desc">${escapeHtml(item.description)}</p>
            <div class="criteria">${bars}</div>
            <div class="footer">
              <span>Overall ${item.overall.toFixed(1)} · ${escapeHtml(item.reason)}</span>
              <a href="${item.sourceUrl}" target="_blank" rel="noreferrer">source</a>
            </div>
          </article>
        `;
      }).join('');

      document.querySelector('#grid').innerHTML = html || '<div class="empty">No skills match current filters.</div>';
      renderChips(items);
    }

    async function bootstrap() {
      const [baseRes, judgeRes] = await Promise.all([
        fetch('/data/skills.base.json'),
        fetch('/data/skills.judged.json')
      ]);

      const base = await baseRes.json();
      const judged = await judgeRes.json();
      const map = new Map(base.skills.map((s) => [s.slug, s]));

      const full = judged.skills
        .filter((j) => map.has(j.slug))
        .map((j) => {
          const src = map.get(j.slug);
          const csum = Object.values(j.scores).reduce((a, b) => a + Number(b), 0);
          return {
            ...src,
            ...j,
            overall: Number.isFinite(j.overall) ? Number(j.overall) : Math.round((csum / criteriaOrder.length) * 10) / 10
          };
        });

      document.querySelector('#search').addEventListener('input', (e) => {
        state.search = e.target.value;
        render(full);
      });

      document.querySelector('#sort').addEventListener('change', (e) => {
        state.sort = e.target.value;
        render(full);
      });

      render(full);
    }

    bootstrap().catch((err) => {
      console.error(err);
      document.querySelector('#grid').innerHTML = '<div class="empty">Failed to load skill dataset.</div>';
    });
  </script>
</body>
</html>
